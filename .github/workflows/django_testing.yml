---
name: Django Testing

on:
  pull_request:
    branches: ["master"]
    paths:
      - ".github/workflows/**"
      - "ekiree_dashboard/**/*.py"
      - "pyproject.toml"
      - "flake.nix"
      - "flake.lock"
  push:
    branches: ["master"]
    paths:
      - ".github/workflows/**"
      - "ekiree_dashboard/**/*.py"
      - "pyproject.toml"
      - "flake.nix"
      - "flake.lock"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  workflow-security:
    name: Workflow Security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7

      - name: Run zizmor
        run: uvx zizmor --format=github --min-severity=medium .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  flake:
    name: Flake Checks
    needs: workflow-security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@90bb610b90bf290cad97484ba341453bd1cbefea # v19

      - name: Enable Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@87b14cf437d03d37989d87f0fa5ce4f5dc1a330b # v8

      - name: Flake check
        run: nix flake check

  test:
    name: Django Tests and Coverage
    needs: [workflow-security, flake]
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read

    env:
      POETFOLIO_DB_NAME: poetfolio_dev
      POETFOLIO_DB_USER: root
      POETFOLIO_DB_PASSWORD: devdevdev
      POETFOLIO_STATIC: /home/runner/static
      POETFOLIO_DB_HOST: 127.0.0.1

    services:
      mariadb:
        image: mariadb:11
        ports:
          - "3306:3306"
        env:
          MARIADB_USER: poetfolio
          MARIADB_PASSWORD: devdevdev
          MARIADB_DATABASE: poetfolio_dev
          MARIADB_ROOT_PASSWORD: devdevdev
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@90bb610b90bf290cad97484ba341453bd1cbefea # v19

      - name: Enable Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@87b14cf437d03d37989d87f0fa5ce4f5dc1a330b # v8

      - name: Build Dev Environment
        run: nix build .#dev -o result-dev

      - name: Verify MariaDB connection
        env:
          PORT: ${{ job.services.mariadb.ports[3306] }}
        run: |
          set -euo pipefail
          for i in {1..60}; do
            if mysqladmin ping -h"127.0.0.1" -P"$PORT" --silent; then
              exit 0
            fi
            sleep 1
          done
          echo "MariaDB failed to become ready in time" >&2
          exit 1

      - name: Set up static path and collect static
        run: |
          set -euo pipefail
          mkdir -p /home/runner/static
          result-dev/bin/python ekiree_dashboard/manage.py collectstatic --noinput

      - name: Run Django test suite with coverage
        run: |
          set -euo pipefail
          result-dev/bin/python -m coverage run \
            --source=ekiree_dashboard \
            ekiree_dashboard/manage.py test ekiree_dashboard -v 2

      - name: Coverage gate and reports
        run: |
          set -euo pipefail
          result-dev/bin/python -m coverage report --fail-under=80
          result-dev/bin/python -m coverage xml -o coverage.xml

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: coverage-report
          path: |
            coverage.xml
            .coverage

  typecheck:
    name: Pyright
    needs: [workflow-security, flake]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.4
        with:
          node-version: "20"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@90bb610b90bf290cad97484ba341453bd1cbefea # v19

      - name: Enable Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@87b14cf437d03d37989d87f0fa5ce4f5dc1a330b # v8

      - name: Build Dev Environment
        run: nix build .#dev -o result-dev

      - name: Run Pyright
        run: |
          set -euo pipefail
          npx --yes pyright --pythonpath result-dev/bin/python ekiree_dashboard/ --outputjson > pyright-report.json

      - name: Upload pyright report
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: pyright-report
          path: pyright-report.json
