---
name: Container Smoke Test

on:
  pull_request:
    branches: ["master"]

permissions: {}

jobs:
  container-smoke-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      mariadb:
        image: mariadb:11
        ports:
          - '3306:3306'
        env:
          MARIADB_USER: poetfolio
          MARIADB_PASSWORD: devdevdev
          MARIADB_DATABASE: poetfolio_dev
          MARIADB_ROOT_PASSWORD: devdevdev
        options: --health-cmd="healthcheck.sh --connect --innodb_initialized" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build container image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          load: true
          tags: ekiree-dashboard:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container (default mode)
        run: |
          docker run -d --name dashboard \
            -p 8000:8000 \
            --add-host=host.docker.internal:host-gateway \
            -e DOCKER_SECRETS=False \
            -e POETFOLIO_SECRET_KEY=ci-test-key-not-for-production \
            -e POETFOLIO_DB_NAME=poetfolio_dev \
            -e POETFOLIO_DB_USER=root \
            -e POETFOLIO_DB_PASSWORD=devdevdev \
            -e POETFOLIO_DB_HOST=host.docker.internal \
            -e POETFOLIO_STATIC=/app/static \
            -e ALLOWED_HOSTS='*' \
            ekiree-dashboard:test

      - name: Wait for dashboard to be ready
        run: |
          echo "Waiting for gunicorn to start..."
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 --max-time 10 http://127.0.0.1:8000/) || true
            echo "Attempt $i/6 - HTTP status: $STATUS"
            if [ "$STATUS" -ge 200 ] 2>/dev/null && [ "$STATUS" -lt 600 ] 2>/dev/null; then
              echo "Dashboard is responding (HTTP $STATUS)."
              exit 0
            fi
            sleep 5
          done
          echo "Container failed to respond in time."
          echo "=== Container status ==="
          docker ps -a
          echo "=== Container logs ==="
          docker logs --tail 100 dashboard
          echo "=== Verbose curl ==="
          curl -v --connect-timeout 5 --max-time 10 http://127.0.0.1:8000/ 2>&1 || true
          exit 1

      - name: Verify HTTP response
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 --max-time 10 http://127.0.0.1:8000/)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 600 ]; then
            echo "Smoke test passed (HTTP $STATUS)."
          else
            echo "Unexpected status: $STATUS"
            docker logs dashboard
            exit 1
          fi

      - name: Verify static files are served
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 --max-time 10 http://127.0.0.1:8000/static/ed/style.css)
          echo "Static file HTTP status: $STATUS"
          if [ "$STATUS" -eq 200 ]; then
            echo "Static files are being served."
          else
            echo "Static file not served (expected 200, got $STATUS)."
            exit 1
          fi

      - name: Verify migrate-only mode exits successfully
        run: |
          docker run --rm --name dashboard-migrate-only \
            --add-host=host.docker.internal:host-gateway \
            -e DOCKER_SECRETS=False \
            -e POETFOLIO_SECRET_KEY=ci-test-key-not-for-production \
            -e POETFOLIO_DB_NAME=poetfolio_dev \
            -e POETFOLIO_DB_USER=root \
            -e POETFOLIO_DB_PASSWORD=devdevdev \
            -e POETFOLIO_DB_HOST=host.docker.internal \
            -e POETFOLIO_STATIC=/app/static \
            -e ALLOWED_HOSTS='*' \
            ekiree-dashboard:test \
            /app/bin/python /app/entrypoint.prod.py --migrate-only

      - name: Verify skip-migrate mode serves after migration check
        run: |
          docker run -d --name dashboard-skip \
            -p 8002:8000 \
            --add-host=host.docker.internal:host-gateway \
            -e DOCKER_SECRETS=False \
            -e POETFOLIO_SECRET_KEY=ci-test-key-not-for-production \
            -e POETFOLIO_DB_NAME=poetfolio_dev \
            -e POETFOLIO_DB_USER=root \
            -e POETFOLIO_DB_PASSWORD=devdevdev \
            -e POETFOLIO_DB_HOST=host.docker.internal \
            -e POETFOLIO_STATIC=/app/static \
            -e ALLOWED_HOSTS='*' \
            ekiree-dashboard:test \
            /app/bin/python /app/entrypoint.prod.py --skip-migrate

          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 --max-time 10 http://127.0.0.1:8002/) || true
            echo "Attempt $i/6 - skip-migrate HTTP status: $STATUS"
            if [ "$STATUS" -ge 200 ] 2>/dev/null && [ "$STATUS" -lt 600 ] 2>/dev/null; then
              echo "Skip-migrate mode is serving (HTTP $STATUS)."
              break
            fi
            sleep 5
          done

          FINAL_STATUS=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 --max-time 10 http://127.0.0.1:8002/) || true
          if [ "$FINAL_STATUS" -lt 200 ] 2>/dev/null || [ "$FINAL_STATUS" -ge 600 ] 2>/dev/null; then
            echo "Skip-migrate container did not become ready (HTTP $FINAL_STATUS)."
            docker logs --tail 100 dashboard-skip
            exit 1
          fi

          docker stop dashboard-skip
          SKIP_EXIT_CODE=$(docker inspect dashboard-skip --format='{{.State.ExitCode}}')
          echo "Skip-migrate container exit code: $SKIP_EXIT_CODE"
          case "$SKIP_EXIT_CODE" in
            0|137|143)
              echo "Skip-migrate container exit code accepted."
              ;;
            *)
              echo "Skip-migrate container exited with unexpected code $SKIP_EXIT_CODE."
              docker logs --tail 50 dashboard-skip
              exit 1
              ;;
          esac

      - name: Verify graceful shutdown
        run: |
          docker stop dashboard
          EXIT_CODE=$(docker inspect dashboard --format='{{.State.ExitCode}}')
          echo "Container exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "Graceful shutdown succeeded."
          else
            echo "Container exited with code $EXIT_CODE."
            docker logs --tail 20 dashboard
            exit 1
          fi

      - name: Debug - check container status
        if: failure()
        run: |
          echo "=== Container status ==="
          docker ps -a
          echo "=== Container logs ==="
          docker logs dashboard
          echo "=== Try running manage.py check directly ==="
          docker exec dashboard /app/bin/python manage.py check --database default 2>&1 || true
          echo "=== Test connectivity from inside the container ==="
          docker exec dashboard /app/bin/python -c "
          import urllib.request
          try:
              r = urllib.request.urlopen('http://127.0.0.1:8000/', timeout=10)
              print(f'Internal check: HTTP {r.status}')
          except Exception as e:
              print(f'Internal check failed: {e}')
          " 2>&1 || true

      - name: Dump container logs on failure
        if: failure()
        run: docker logs dashboard
